<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumas magisches Bilderbuch</title>
    
    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (übersetzt den React-Code im Browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#fdfaf3]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // SVG Icons (ersetzen lucide-react für die Standalone-Version)
        const ChevronLeftIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        );
        const ChevronRightIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        );
        const BookOpenIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        );
        const HeartIcon = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        );

        const initialPages = [
            { id: 1, isTitle: true, text: "Luma und die Giraffensprache\n\nEine Geschichte über das Zuhören mit dem Herzen", imageUrl: "./images/luma_seite_1.png" },
            { id: 2, text: "Im grossen, bunten Savannenland lebte einmal eine freundliche Giraffe namens Luma. Luma hatte einen ganz langen Hals – so lang, dass sie über alle anderen Tiere hinwegsehen konnte. Aber das Wichtigste war: Luma hatte ein besonders grosses Herz.", imageUrl: "./images/luma_seite_2.png" },
            { id: 3, text: "Eines Tages stritten sich die Tiere. Die Zebras schimpften, die Affen kreischten und sogar die Elefanten trompeteten wütend. Niemand hörte dem anderen zu.", imageUrl: "./images/luma_seite_3.png" },
            { id: 4, text: "Luma beobachtete das alles von oben. Sie beugte ihren langen Hals hinunter und sagte ganz ruhig: „Stopp. Ich möchte euch etwas zeigen.“", imageUrl: "./images/luma_seite_4.png" },
            { id: 5, text: "Die Tiere wurden langsam still. Luma erklärte: „Weil ich so gross bin, kann ich weit sehen – nicht nur mit meinen Augen, sondern auch mit meinem Herzen. Ich höre zu, ich versuche zu verstehen und ich spreche freundlich.“", imageUrl: "./images/luma_seite_5.png" },
            { id: 6, text: "„Aber wie geht das?“, fragte ein kleines Zebra.\nLuma lächelte. „Ich sage, was ich sehe. Dann sage ich, wie ich mich fühle. Und dann sage ich, was ich brauche oder mir wünsche – ohne zu schimpfen.“", imageUrl: "./images/luma_seite_6.png" },
            { id: 7, text: "Die Tiere probierten es aus. Das Zebra sagte: „Ich sehe, dass du mein Gras gefressen hast. Ich bin traurig. Ich möchte, dass wir teilen.“", imageUrl: "./images/luma_seite_7.png" },
            { id: 8, text: "Der Affe nickte. „Oh, das wusste ich nicht. Ich hatte Hunger.“\nUnd plötzlich war es ganz ruhig und freundlich.", imageUrl: "./images/luma_seite_8.png" },
            { id: 9, text: "Von diesem Tag an nannten die Tiere diese besondere Art zu sprechen die Giraffensprache – weil sie wie Luma mit einem grossen Herzen spricht.", imageUrl: "./images/luma_seite_9.png" },
            { id: 10, text: "Und wenn du gut zuhörst und freundlich sprichst, dann kannst du sie auch lernen. 💛", imageUrl: "./images/luma_seite_10.png" }
        ];

        function App() {
            const [currentPageIndex, setCurrentPageIndex] = useState(0);
            const [flipState, setFlipState] = useState({ isFlipping: false, direction: null, toIndex: null });

            const ANIMATION_DURATION = 800;

            const goToNextPage = () => {
                if (currentPageIndex < initialPages.length - 1 && !flipState.isFlipping) {
                    setFlipState({ isFlipping: true, direction: 'next', toIndex: currentPageIndex + 1 });
                    setTimeout(() => {
                        setCurrentPageIndex(currentPageIndex + 1);
                        setFlipState({ isFlipping: false, direction: null, toIndex: null });
                    }, ANIMATION_DURATION);
                }
            };

            const goToPrevPage = () => {
                if (currentPageIndex > 0 && !flipState.isFlipping) {
                    setFlipState({ isFlipping: true, direction: 'prev', toIndex: currentPageIndex - 1 });
                    setTimeout(() => {
                        setCurrentPageIndex(currentPageIndex - 1);
                        setFlipState({ isFlipping: false, direction: null, toIndex: null });
                    }, ANIMATION_DURATION);
                }
            };

            const goToPage = (index) => {
                if (index === currentPageIndex || flipState.isFlipping) return;
                const direction = index > currentPageIndex ? 'next' : 'prev';
                setFlipState({ isFlipping: true, direction, toIndex: index });
                setTimeout(() => {
                    setCurrentPageIndex(index);
                    setFlipState({ isFlipping: false, direction: null, toIndex: null });
                }, ANIMATION_DURATION);
            };

            const LeftPage = ({ page }) => (
                <div className={`w-full h-full p-4 sm:p-8 md:p-14 flex flex-col justify-center bg-[#Fdfbf7] relative ${page.isTitle ? 'items-center text-center' : ''}`}>
                    <div className="absolute top-2 left-2 sm:top-4 sm:left-4 md:top-6 md:left-6 text-amber-200">
                        <BookOpenIcon className="w-5 h-5 sm:w-7 sm:h-7" />
                    </div>
                    {page.isTitle ? (
                        <div className="px-2">
                            <h2 className="text-xl sm:text-3xl lg:text-5xl font-bold text-amber-800 font-serif mb-2 sm:mb-6 leading-tight">Luma und die Giraffensprache</h2>
                            <p className="text-[10px] sm:text-lg lg:text-2xl text-amber-600 font-serif italic">Eine Geschichte über das Zuhören mit dem Herzen</p>
                        </div>
                    ) : (
                        <p className="text-[11px] sm:text-lg lg:text-2xl text-gray-800 font-serif leading-relaxed whitespace-pre-wrap px-2 sm:px-0">{page.text}</p>
                    )}
                    <div className="absolute bottom-2 sm:bottom-4 left-0 w-full text-center text-amber-500/40 font-medium font-serif text-[9px] sm:text-sm">Seite {page.id}</div>
                </div>
            );

            const RightPage = ({ page }) => (
                <div className="w-full h-full bg-[#f4ebe1] relative flex flex-col items-center justify-center overflow-hidden">
                    <img 
                        src={page.imageUrl} 
                        alt={`Illustration für Seite ${page.id}`} 
                        className="w-full h-full object-cover"
                        onError={(e) => {
                            e.target.onerror = null;
                            e.target.src = `https://placehold.co/800x800/e8dcc4/a38d6d?text=Bild+Seite+${page.id}+fehlt`;
                        }}
                    />
                </div>
            );

            return (
                <div className="min-h-screen bg-[#fdfaf3] text-gray-800 font-sans p-2 sm:p-4 md:p-8 flex flex-col items-center selection:bg-amber-200 overflow-hidden">
                    <style>{`
                        .flip-container { perspective: 2500px; }
                        .flipper { position: absolute; top: 0; width: 50%; height: 100%; transform-style: preserve-3d; z-index: 20; }
                        .flipper-next { right: 0; transform-origin: left center; animation: flipNext ${ANIMATION_DURATION}ms ease-in-out forwards; }
                        .flipper-prev { left: 0; transform-origin: right center; animation: flipPrev ${ANIMATION_DURATION}ms ease-in-out forwards; }
                        .face { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; background-color: #Fdfbf7; overflow: hidden; }
                        .face-front { z-index: 2; box-shadow: inset 0 0 15px rgba(0,0,0,0.05); }
                        .face-back { transform: rotateY(180deg); box-shadow: inset 0 0 15px rgba(0,0,0,0.05); }
                        @keyframes flipNext { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(-180deg); } }
                        @keyframes flipPrev { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(180deg); } }
                    `}</style>

                    <header className="mb-4 sm:mb-8 text-center max-w-3xl mt-2 sm:mt-0">
                        <h1 className="text-2xl sm:text-3xl md:text-4xl font-bold text-amber-800 mb-1 sm:mb-2 flex items-center justify-center gap-2 sm:gap-3 font-serif">
                            <HeartIcon className="text-red-500 fill-current w-6 h-6 sm:w-8 sm:h-8" /> Lumas magisches Bilderbuch
                        </h1>
                        <p className="text-amber-600/80 text-xs sm:text-base hidden sm:block">Eine liebevolle Geschichte über gewaltfreie Kommunikation.</p>
                    </header>

                    <div className="w-full max-w-5xl h-[300px] sm:h-[450px] md:h-[600px] bg-[#Fdfbf7] rounded-sm shadow-2xl flex flex-row border-[3px] sm:border-4 border-[#e8dcc4] relative flip-container">
                        <div className="absolute left-1/2 top-0 bottom-0 w-4 sm:w-8 -ml-2 sm:-ml-4 bg-gradient-to-r from-transparent via-[#d4c3a3]/40 to-transparent z-30 pointer-events-none"></div>

                        <div className="w-1/2 h-full border-r-[1px] sm:border-r-2 border-[#e8dcc4]">
                            <LeftPage page={initialPages[flipState.isFlipping && flipState.direction === 'next' ? currentPageIndex : flipState.isFlipping && flipState.direction === 'prev' ? flipState.toIndex : currentPageIndex]} />
                        </div>

                        <div className="w-1/2 h-full">
                            <RightPage page={initialPages[flipState.isFlipping && flipState.direction === 'next' ? flipState.toIndex : flipState.isFlipping && flipState.direction === 'prev' ? currentPageIndex : currentPageIndex]} />
                        </div>

                        {flipState.isFlipping && flipState.direction === 'next' && (
                            <div className="flipper flipper-next">
                                <div className="face face-front"><RightPage page={initialPages[currentPageIndex]} /></div>
                                <div className="face face-back border-r-[1px] sm:border-r-2 border-[#e8dcc4]"><LeftPage page={initialPages[flipState.toIndex]} /></div>
                            </div>
                        )}

                        {flipState.isFlipping && flipState.direction === 'prev' && (
                            <div className="flipper flipper-prev">
                                <div className="face face-front border-r-[1px] sm:border-r-2 border-[#e8dcc4]"><LeftPage page={initialPages[currentPageIndex]} /></div>
                                <div className="face face-back"><RightPage page={initialPages[flipState.toIndex]} /></div>
                            </div>
                        )}
                    </div>

                    <div className="flex justify-center items-center gap-3 sm:gap-6 md:gap-8 mt-6 sm:mt-10 mb-6 w-full">
                        <button disabled={currentPageIndex === 0 || flipState.isFlipping} onClick={goToPrevPage} className="p-3 sm:p-4 rounded-full bg-white shadow-md text-amber-800 disabled:opacity-30 disabled:hover:scale-100 hover:bg-amber-50 hover:scale-105 transition-all">
                            <ChevronLeftIcon className="w-5 h-5 sm:w-7 sm:h-7" />
                        </button>
                        
                        <div className="flex gap-1.5 sm:gap-2 flex-wrap justify-center px-2">
                            {initialPages.map((_, idx) => (
                                <button key={idx} disabled={flipState.isFlipping} onClick={() => goToPage(idx)} className={`w-2.5 h-2.5 sm:w-3.5 sm:h-3.5 rounded-full transition-all duration-300 ${idx === currentPageIndex && !flipState.isFlipping ? 'bg-amber-500 scale-125' : 'bg-gray-300 hover:bg-amber-300'}`} />
                            ))}
                        </div>

                        <button disabled={currentPageIndex === initialPages.length - 1 || flipState.isFlipping} onClick={goToNextPage} className="p-3 sm:p-4 rounded-full bg-white shadow-md text-amber-800 disabled:opacity-30 disabled:hover:scale-100 hover:bg-amber-50 hover:scale-105 transition-all">
                            <ChevronRightIcon className="w-5 h-5 sm:w-7 sm:h-7" />
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
